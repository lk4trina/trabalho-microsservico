<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Usuário</title>
  <link rel="stylesheet" href="./styles/index.css">
</head>
<body>

<div class="center">
  <div class="card">
    <h2>Criar Conta</h2>


    <input id="reg-user" placeholder="Usuário (Username)">
    <input id="reg-pass" type="password" placeholder="Senha">
    <input id="reg-pass-confirm" type="password" placeholder="Confirmar Senha">

    <button id="btn-register" onclick="register()">Cadastrar</button>

    <div style="margin-top: 15px;">
        <a href="login.html" style="font-size: 0.8rem; color: #555; text-decoration: none;">
            Já tem uma conta? <strong>Entrar</strong>
        </a>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
