<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Minhas Reservas</title>
    <link rel="stylesheet" href="../../styles/index.css" />
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../rooms/rooms.css" />
    <link rel="stylesheet" href="./booking.css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  </head>

  <div id="create-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Nova Reserva</h2>
      <label for="roomSelect">Escolher Sala:</label>
      <select id="roomSelect"></select>

      <label for="createStartTime">Início:</label>
      <input id="createStartTime" type="datetime-local" />

      <label for="createEndTime">Fim:</label>
      <input id="createEndTime" type="datetime-local" />

      <div class="modal-buttons">
        <button onclick="saveNewBooking()" class="btn-primary">Confirmar</button>
        <button onclick="closeCreateModal()" class="btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="edit-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Detalhes da Reserva</h2>
      
      <label for="editRoomSelect">Sala:</label>
      <select id="editRoomSelect"></select>

      <label for="editStartTime">Início:</label>
      <input id="editStartTime" type="datetime-local" />

      <label for="editEndTime">Fim:</label>
      <input id="editEndTime" type="datetime-local" />

      <div class="modal-buttons" style="display: flex; gap: 10px; margin-top: 15px;">
        <button id="btn-save-edit" class="btn-primary">Salvar</button>
        <button id="btn-delete-booking" class="btn-delete-booking">Excluir</button>
        <button onclick="closeEditModal()" class="btn-secondary">Fechar</button>
      </div>
    </div>
  </div>

  <body>
    <div class="container">
      <div class="sidebar" id="sidebar">
        <button class="toggle-btn" onclick="toggleSidebar()">
          <i class="fa fa-bars"></i> <span>Reduzir</span>
        </button>
        <h2 class="menu-title">Menu</h2>
        <button onclick="goToRooms()">
          <i class="fa fa-door-open"></i> <span>Ver Salas</span>
        </button>
        <button onclick="logout()">
          <i class="fas fa-sign-out"></i> <span>Sair</span>
        </button>
      </div>

      <div class="main">
        <header>
          <h2>Minha Agenda de Reservas</h2>
        </header>

        <div id='calendar-container' class="calendar-container">
          <div id='calendar'></div>
        </div>
      </div>
    </div>
    <script type="module" src="./booking.js"></script>
  </body>
</html>
