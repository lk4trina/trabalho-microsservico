<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Salas - Admin</title>
    <link rel="stylesheet" href="../../styles/index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <div class="sidebar" id="sidebar">
        <button class="toggle-btn" onclick="toggleSidebar()">
          <i class="fa fa-bars"></i>
          <span>Reduzir</span>
        </button>

        <h2 class="menu-title">Admin</h2>

        <button id="btn-create-room" onclick="openModal()">
          <i class="fa fa-plus"></i>
          <span>Criar sala</span>
        </button>

        <button onclick="myBookings()">
          <i class="fa fa-calendar-check"></i>
          <span>Minhas Reservas</span>
        </button>

        <button onclick="logout()">
          <i class="fas fa-sign-out"></i>
          <span>Sair</span>
        </button>
      </div>

      <div class="main">
        <div class="filter">
          <button onclick="setFilter('all')">Todas</button>
          <button onclick="setFilter('active')">Ativas</button>
          <button onclick="setFilter('inactive')">Inativas</button>
        </div>

        <div id="rooms" class="rooms"></div>
      </div>
    </div>

    <!-- ✅ MODAL DE CRIAR -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <h2>Criar Sala</h2>
        <input id="roomName" placeholder="Nome" />
        <input id="capacity" type="number" placeholder="Capacidade" />
        <button onclick="createRoom()">Criar</button>
        <button onclick="closeModal()">Cancelar</button>
      </div>
    </div>

    <div id="editModal" class="modal hidden">
      <div class="modal-content">
        <h2>Editar Sala</h2>
        <input id="editRoomName" placeholder="Nome da sala" />
        <input id="editCapacity" type="number" placeholder="Capacidade" />

        <button onclick="confirmEdit()">Salvar</button>
        <button onclick="closeEditModal()">Cancelar</button>
      </div>
    </div>

    <script type="module" src="../rooms/rooms.js"></script>
  </body>
</html>
