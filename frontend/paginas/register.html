<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Usuário</title>
  <link rel="stylesheet" href="../styles/index.css">
</head>
<body>

<div class="center">
  <div class="card-regst">
    <h2>Criar Conta</h2>


    <input id="reg-user" placeholder="Usuário (Username)">
    <input id="reg-pass" type="password" placeholder="Senha">
    <input id="reg-pass-confirm" type="password" placeholder="Confirmar Senha">

    <button id="btn-register" onclick="cadastrar()">Cadastrar</button>

    <div style="margin-top: 15px;">
        <span>Já tem uma conta? </span><a href="login.html">
            Entrar
        </a>
    </div>
  </div>
</div>

<script src="../script.js"></script>
</body>
</html>
