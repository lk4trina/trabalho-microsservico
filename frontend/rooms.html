<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Salas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>Menu</h2>
    <button onclick="loadRooms()">Ver salas</button>
    <button onclick="logout()">Sair</button>
  </div>

  <div class="main">

    <div class="card">
      <h2>Criar Sala</h2>

      <input id="roomName" placeholder="Nome">
      <input id="capacity" type="number" placeholder="Capacidade">

      <button onclick="createRoom()">Criar</button>
    </div>

    <div id="rooms" class="rooms"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
